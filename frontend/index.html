<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoChain Pro</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="app-container">
        <header class="navbar">
            <div class="navbar-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                CryptoChain Pro
            </div>
        </header>

        <main class="main-layout">
            <!-- Left Side: Pipeline Builder & History -->
            <aside class="panel panel-left">
                <h2 class="section-title">Available Algorithms</h2>
                <div id="algorithm-list">
                    <div class="algo-item" onclick="window.app.addAlgo('AES')">
                        <span class="algo-item-title">AES-256</span>
                        <span class="badge">+</span>
                    </div>
                    <div class="algo-item" onclick="window.app.addAlgo('CHACHA20')">
                        <span class="algo-item-title">ChaCha20</span>
                        <span class="badge">+</span>
                    </div>
                    <div class="algo-item" onclick="window.app.addAlgo('RSA')">
                        <span class="algo-item-title">RSA</span>
                        <span class="badge">+</span>
                    </div>
                    <div class="algo-item" onclick="window.app.addAlgo('BASE64')">
                        <span class="algo-item-title">Base64</span>
                        <span class="badge">+</span>
                    </div>
                    <div class="algo-item" onclick="window.app.addAlgo('HEX')">
                        <span class="algo-item-title">Hex</span>
                        <span class="badge">+</span>
                    </div>
                    <div class="algo-item" onclick="window.app.addAlgo('REVERSE')">
                        <span class="algo-item-title">Reverse</span>
                        <span class="badge">+</span>
                    </div>
                </div>

                <h2 class="section-title" style="margin-top: 32px;">Pipeline Configuration</h2>
                <div id="pipeline-list">
                    <!-- Pipeline items will be rendered here -->
                </div>

                <div style="margin-top: 32px; display: flex; justify-content: space-between; align-items: center;">
                    <h2 class="section-title" style="margin: 0;">Local History</h2>
                    <button class="btn btn-outline btn-sm" onclick="window.app.clearHistory()">Clear</button>
                </div>
                <div id="history-list" style="margin-top: 16px;">
                    <!-- History items will be rendered here -->
                </div>
            </aside>

            <!-- Center: Input Area -->
            <section class="panel panel-center">
                <h2 class="section-title">Encryption Studio</h2>
                
                <div class="form-group">
                    <label class="form-label" for="input-text">Input Text / Encrypted Payload (JSON)</label>
                    <textarea class="form-control" id="input-text" placeholder="Enter text to encrypt, or paste JSON payload to decrypt..."></textarea>
                </div>
                
                <div id="keys-wrapper">
                    <div class="form-group" id="global-key-container">
                        <label class="form-label" for="input-key">Symmetric Key / RSA Key</label>
                        <textarea class="form-control" id="input-key" placeholder="Enter secret password or paste RSA Key..." style="min-height: 80px;"></textarea>
                    </div>
                    <div id="dynamic-keys-container" style="display: none; margin-bottom: 16px;">
                        <!-- Dynamic key inputs will be rendered here -->
                    </div>
                </div>

                <div class="flex-row">
                    <button class="btn btn-primary" id="btn-encrypt" onclick="window.app.encrypt()">Encrypt Pipeline</button>
                    <button class="btn btn-outline" id="btn-decrypt" onclick="window.app.decrypt()">Decrypt Payload</button>
                </div>

                <div class="flex-row" style="margin-bottom: 32px;">
                    <button class="btn btn-danger" onclick="window.app.clearInput()">Clear Input</button>
                </div>

                <!-- RSA Management Area -->
                <h2 class="section-title">RSA Key Management</h2>
                <button class="btn btn-outline" id="btn-generate-rsa" onclick="window.app.generateRSA()" style="width: 100%; margin-bottom: 16px;">Generate RSA Key Pair</button>
                
                <div class="form-group">
                    <label class="form-label" for="rsa-public">Public Key (For Encryption)</label>
                    <textarea class="form-control" id="rsa-public" readonly style="min-height: 80px;"></textarea>
                    <div style="display: flex; gap: 8px; margin-top: 8px;">
                        <button class="btn btn-outline btn-sm" onclick="window.app.copyRSAPublic(this)">Copy Public Key</button>
                        <button class="btn btn-outline btn-sm" onclick="window.app.useRSAPublic()">Use For Encryption</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="rsa-private">Private Key (For Decryption)</label>
                    <textarea class="form-control" id="rsa-private" readonly style="min-height: 80px;"></textarea>
                    <div style="display: flex; gap: 8px; margin-top: 8px;">
                        <button class="btn btn-outline btn-sm" onclick="window.app.copyRSAPrivate(this)">Copy Private Key</button>
                        <button class="btn btn-outline btn-sm" onclick="window.app.useRSAPrivate()">Use For Decryption</button>
                    </div>
                </div>

            </section>

            <!-- Right Side: Output Area -->
            <aside class="panel panel-right">
                <h2 class="section-title">Output Result</h2>
                <div id="output-area" class="fade-in"></div>

                <div style="margin-top: 16px; display: flex; flex-direction: column; gap: 8px;">
                    <button class="btn btn-outline" onclick="window.app.copyOutput(this)">Copy Result</button>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn btn-outline" style="flex: 1;" onclick="window.app.downloadTxt()">Export TXT</button>
                        <button class="btn btn-outline" style="flex: 1;" onclick="window.app.downloadJson()">Export JSON</button>
                    </div>
                    <button class="btn btn-danger" onclick="window.app.clearOutput()">Clear Output</button>
                </div>
            </aside>
        </main>
    </div>

    <!-- JS modules -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
